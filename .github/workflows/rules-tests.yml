name: Firestore Rules Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install firebase-tools globally
        run: npm install -g firebase-tools

      - name: Install project dependencies
        run: npm ci

      - name: Print versions
        run: |
          node --version
          npm --version
          firebase --version
          java -version

      - name: Inspect workspace
        run: |
          pwd
          ls -la
          ls -la src/test/
          cat firebase.json
          head -20 firestore.rules

      - name: Pre-download Firestore emulator JAR
        run: firebase setup:emulators:firestore

      - name: Smoke test emulator (no-op exec)
        run: firebase emulators:exec --only firestore --project barbacker-rules-test "echo emulator-up-ok"

      - name: Run Firestore rules tests
        run: firebase emulators:exec --only firestore --project barbacker-rules-test "npx vitest --run --config vitest.rules.config.ts"
