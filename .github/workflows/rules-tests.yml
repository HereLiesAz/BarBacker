name: Firestore Rules Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install firebase-tools globally
        # Pin to a known-stable major. Newer firebase-tools releases
        # have occasionally shipped Firestore-emulator startup regressions.
        run: npm install -g firebase-tools@13

      - name: Install project dependencies
        run: npm ci

      - name: Print versions
        run: |
          node --version
          npm --version
          firebase --version
          java -version

      - name: Inspect workspace
        run: |
          pwd
          ls -la
          cat firebase.json
          head -20 firestore.rules

      - name: Pre-download Firestore emulator JAR
        run: firebase setup:emulators:firestore

      - name: Start Firestore emulator
        # Background the emulator and wait for the port to open so we
        # can see startup output in its own log file if it dies.
        shell: bash
        run: |
          firebase emulators:start --only firestore --project barbacker-rules-test \
            > emulator.log 2>&1 &
          echo $! > emulator.pid
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/8080) 2>/dev/null; then
              echo "emulator up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "emulator did not come up; tail of emulator.log:"
          tail -200 emulator.log
          exit 1

      - name: Run Firestore rules tests
        run: npx vitest --run --config vitest.rules.config.ts

      - name: Stop emulator
        if: always()
        shell: bash
        run: |
          if [ -f emulator.pid ]; then
            kill "$(cat emulator.pid)" 2>/dev/null || true
          fi
          echo "--- emulator.log tail ---"
          tail -200 emulator.log || true
